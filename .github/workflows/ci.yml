name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 5 * * *"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Run backend verification commands
        run: |
          mkdir -p artifacts/backend
          set -o pipefail
          npm run test:unit 2>&1 | tee artifacts/backend/unit-test.log
          npm run test:integration 2>&1 | tee artifacts/backend/integration-test.log
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run test:behavior:smoke 2>&1 | tee artifacts/backend/behavior-test.log
          else
            npm run test:behavior:full 2>&1 | tee artifacts/backend/behavior-test.log
          fi

      - name: Upload backend test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-logs
          path: artifacts/backend
          if-no-files-found: error

      - name: Upload behavior reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behavior-test-reports
          path: artifacts/behavior
          if-no-files-found: error

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web install

      - name: Run canonical frontend test command
        run: npm --prefix web run test

      - name: Run canonical frontend build command
        run: npm --prefix web run build
