name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Run backend verification commands
        run: |
          mkdir -p artifacts/backend
          set -o pipefail
          npm run test 2>&1 | tee artifacts/backend/backend-test.log

      - name: Upload backend test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-logs
          path: artifacts/backend
          if-no-files-found: error

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web install

      - name: Run canonical frontend test command
        run: npm --prefix web run test

      - name: Run canonical frontend build command
        run: npm --prefix web run build
