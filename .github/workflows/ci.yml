name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 5 * * *"

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Enforce coverage ratchet policy
        run: npm run coverage:ratchet

      - name: Run backend coverage checks
        run: |
          mkdir -p artifacts/backend
          set -o pipefail
          npm run test:coverage 2>&1 | tee artifacts/backend/coverage.log

      - name: Run backend behavior tests
        run: |
          mkdir -p artifacts/backend
          set -o pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run test:behavior:smoke 2>&1 | tee artifacts/backend/behavior-test.log
          else
            npm run test:behavior:full 2>&1 | tee artifacts/backend/behavior-test.log
          fi

      - name: Upload backend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifacts
          path: artifacts/backend
          if-no-files-found: error

      - name: Upload behavior reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: behavior-test-reports
          path: artifacts/behavior
          if-no-files-found: error

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web install

      - name: Enforce coverage ratchet policy
        run: npm run coverage:ratchet

      - name: Run frontend coverage checks
        run: |
          mkdir -p artifacts/frontend
          set -o pipefail
          npm --prefix web run test:coverage 2>&1 | tee artifacts/frontend/coverage.log

      - name: Run canonical frontend build command
        run: npm --prefix web run build

      - name: Upload frontend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifacts
          path: artifacts/frontend
          if-no-files-found: error

  merge-readiness:
    name: merge-readiness
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: always()
    steps:
      - name: Fail when backend or frontend checks failed
        run: |
          echo "backend result:  ${{ needs.backend.result }}"
          echo "frontend result: ${{ needs.frontend.result }}"
          test "${{ needs.backend.result }}" = "success"
          test "${{ needs.frontend.result }}" = "success"
